name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # --- macOS dependencies ---
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sqlite zeromq

      # --- Linux dependencies ---
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libzmq3-dev libssl-dev

      # --- Build and test ---
      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build -j$(nproc || sysctl -n hw.logicalcpu)

      - name: Test
        run: ctest --output-on-failure
        working-directory: build
